# Server
server.port=5002

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/syncres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:password}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Session
spring.session.store-type=jdbc
server.servlet.session.timeout=60m
spring.session.jdbc.initialize-schema=never

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Gemini
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-1.5-pro
gemini.max-output-tokens=8192
gemini.temperature=0.2

# File Storage
s3.access-key-id=${S3_ACCESS_KEY_ID}
s3.secret-access-key=${S3_SECRET_ACCESS_KEY}
s3.region=${S3_REGION}
s3.bucket-name=${S3_BUCKET_NAME}
app.storage.pdf-expiry-hours=24

# Matcher
app.matcher.threshold=65
app.matcher.max-cv-chars=15000
app.matcher.max-jd-chars=10000

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Virtual threads
spring.threads.virtual.enabled=true

# Email (SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM}
app.otp.expiry-minutes=10

# JobRunr
org.jobrunr.background-job-server.enabled=true
org.jobrunr.background-job-server.worker-count=4
org.jobrunr.dashboard.enabled=true
org.jobrunr.database.type=sql
