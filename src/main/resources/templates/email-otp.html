<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <h2>Verify your Syncres account</h2>
    <p>Hi <span th:text="${name}"></span>,</p>
    <p>Please use the following code to verify your email address:</p>
    <div style="font-size: 24px; font-weight: bold; font-family: monospace; padding: 20px; background-color: #f4f4f4; text-align: center; border-radius: 5px;">
        <span th:text="${otp}"></span>
    </div>
    <p>This code expires in <span th:text="${expiry}"></span> minutes.</p>
    <p>If you did not request this, please ignore this email.</p>
    <p>Best regards,<br/>The Syncres Team</p>
</body>
</html>
